<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aries AI Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #121212; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
        
        #chat-header { background: #1f1f1f; padding: 15px; text-align: center; color: #bb86fc; font-weight: bold; }
        
        #chat-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        /* Input Area (Tombol & Textbox) */
        #input-area { background: #1f1f1f; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
        #user-input { flex: 1; padding: 10px; border-radius: 8px; border: none; background: #2c2c2c; color: white; }
        #send-btn { padding: 10px 20px; border-radius: 8px; border: none; background: #6200ee; color: white; cursor: pointer; font-weight: bold; }
        
        /* Responsif HP/PC */
        @media (min-width: 768px) {
            body { max-width: 600px; margin: auto; border-left: 1px solid #333; border-right: 1px solid #333; }
        }

        .message { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; }
        .user { background: #6200ee; align-self: flex-end; }
        .ai { background: #2c2c2c; align-self: flex-start; }
    </style>
</head>
<body>

    <div id="chat-header">🔮 ARIES AI CHAT</div>
    <div id="chat-container">
        <div class="message ai">Halo bro! Apa yang bisa gua bantu hari ini?</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ketik pesan di sini...">
        <button id="send-btn" onclick="prosesChat()">Kirim</button>
    </div>

    <script>
        const API_KEY = "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"; 
        let chatHistory = [{ role: "system", content: "Kamu Aries AI, jawab santai pakai bahasa Indonesia." }];

        function prosesChat() {
            const input = document.getElementById('user-input');
            const pesan = input.value;
            if (!pesan.trim()) return;

            // Tampilkan ke layar
            const container = document.getElementById('chat-container');
            container.innerHTML += `<div class="message user">${pesan}</div>`;
            input.value = '';

            chatHistory.push({ role: "user", content: pesan });

            fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: chatHistory })
            })
            .then(res => res.json())
            .then(data => {
                const jawaban = data.choices[0].message.content;
                container.innerHTML += `<div class="message ai">${jawaban.replace(/\n/g, '<br>')}</div>`;
                chatHistory.push({ role: "assistant", content: jawaban });
                container.scrollTop = container.scrollHeight;
            });
        }
    </script>
</body>
</html>
